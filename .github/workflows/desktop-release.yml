name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_args: "--linux AppImage deb"
          - os: windows-latest
            platform: windows
            build_args: "--win nsis"
          - os: macos-latest
            platform: macos
            build_args: "--mac dmg zip"

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
      WIN_CSC_LINK: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install desktop dependencies
        run: npm install

      - name: Generate app icons
        run: npm run electron:icons

      - name: Build installers
        shell: bash
        run: |
          PUBLISH_MODE="never"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            PUBLISH_MODE="always"
          fi
          npx electron-builder ${{ matrix.build_args }} --publish "${PUBLISH_MODE}"

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termin-${{ matrix.platform }}
          path: dist-electron/*
          if-no-files-found: error
