<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Termin" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fontawesome/css/all.min.css') }}" />
    <style>
      :root {
        color-scheme: light;
        --bg: #0b0d12;
        --panel: #151a22;
        --panel-alt: #10141b;
        --ink: #e6edf3;
        --muted: #9aa3ad;
        --accent: #4cc9f0;
        --accent-strong: #00b4d8;
        --border: #232a36;
        --success: #6ee7b7;
        --grid: rgba(255, 255, 255, 0.06);
      }

      * { box-sizing: border-box; }

      .hidden {
        display: none !important;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #141a24 0%, var(--bg) 55%, #0a0d12 100%);
        color: var(--ink);
      }

      header {
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: rgba(10, 13, 18, 0.9);
        backdrop-filter: blur(8px);
      }

      header h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .account-shell {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .account-trigger {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--ink);
        border-radius: 999px;
        padding: 5px 8px 5px 6px;
        cursor: pointer;
        transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
      }

      .account-trigger:hover {
        border-color: rgba(76, 201, 240, 0.35);
        background: rgba(76, 201, 240, 0.08);
        transform: translateY(-1px);
      }

      .account-trigger:focus-visible {
        outline: 2px solid rgba(76, 201, 240, 0.45);
        outline-offset: 2px;
      }

      .account-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: 1px solid rgba(76, 201, 240, 0.25);
        background: linear-gradient(135deg, rgba(76, 201, 240, 0.18), rgba(255, 255, 255, 0.05));
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        overflow: hidden;
      }

      .account-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .account-email-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .account-email-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 10px 0;
        border-bottom: 1px solid var(--grid);
      }

      .account-email-card {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .account-email-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 1px solid rgba(76, 201, 240, 0.24);
        background: linear-gradient(135deg, rgba(76, 201, 240, 0.18), rgba(255, 255, 255, 0.05));
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        overflow: hidden;
        flex: 0 0 auto;
      }

      .account-email-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .account-email-copy {
        min-width: 0;
      }

      .account-email-copy div:first-child {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .account-email-actions {
        flex: 0 0 auto;
      }

      .account-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        min-width: 0;
      }

      .account-name {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.1;
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .account-email {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.1;
        max-width: 180px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .account-chevron {
        width: 14px;
        height: 14px;
        color: var(--muted);
        transition: transform 140ms ease;
      }

      .account-shell.is-open .account-chevron {
        transform: rotate(180deg);
      }

      .account-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 10px);
        width: 250px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(17, 21, 28, 0.96);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
        padding: 10px;
        display: none;
        z-index: 40;
        backdrop-filter: blur(10px);
      }

      .account-shell.is-open .account-menu {
        display: block;
      }

      .account-menu-header {
        padding: 8px 10px 10px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }

      .account-menu-name {
        font-size: 13px;
        font-weight: 600;
      }

      .account-menu-email {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }

      .account-menu-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        text-decoration: none;
        color: var(--ink);
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid transparent;
        transition: background 140ms ease, border-color 140ms ease;
      }

      .account-menu-link:hover {
        background: rgba(76, 201, 240, 0.08);
        border-color: rgba(76, 201, 240, 0.2);
      }

      .account-menu-link + .account-menu-link {
        margin-top: 4px;
      }

      main {
        padding: 0;
        margin: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: calc(100vh - 54px);
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: var(--panel-alt);
        padding: 16px 14px;
      }

      .content {
        padding: 16px 18px 32px;
      }

      .view-switcher {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 14px;
        padding: 4px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(12, 16, 23, 0.72);
      }

      .view-switch {
        padding: 7px 12px;
        border-radius: 999px;
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
      }

      .view-switch.active {
        background: color-mix(in srgb, var(--accent) 18%, rgba(255, 255, 255, 0.02));
        color: var(--ink);
        box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 26%, transparent);
      }

      .todo-board {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .todo-date-group {
        padding-top: 14px;
      }

      .todo-date-heading {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .todo-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .todo-item {
        display: grid;
        grid-template-columns: minmax(130px, 0.75fr) minmax(0, 1.4fr) minmax(140px, 0.8fr) minmax(90px, 0.45fr) minmax(180px, 0.95fr) auto;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-left: 4px solid var(--todo-color, var(--accent));
        border-radius: 10px;
        background: rgba(16, 20, 27, 0.82);
      }

      .todo-item-main {
        min-width: 0;
      }

      .todo-item-title {
        font-size: 14px;
        font-weight: 500;
        color: var(--ink);
        min-width: 0;
      }

      .todo-project-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        min-width: 0;
        padding-right: 6px;
      }

      .todo-project-name,
      .todo-group-name,
      .todo-status-cell {
        font-size: 11px;
        line-height: 1.2;
      }

      .todo-project-name {
        color: color-mix(in srgb, var(--todo-color, var(--accent)) 70%, white 30%);
        font-weight: 600;
      }

      .todo-group-name {
        color: var(--muted);
      }

      .todo-due-cell {
        min-height: 0;
      }

      .todo-due-cell .due-summary {
        padding: 5px 8px;
        min-height: 0;
      }

      .todo-status-cell {
        color: var(--muted);
        text-transform: lowercase;
      }

      .todo-assignments {
        min-width: 0;
        gap: 4px;
      }

      .todo-assignments .badge {
        max-width: 100%;
      }

      .todo-open-link {
        color: var(--ink);
        text-decoration: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 11px;
        white-space: nowrap;
      }

      @media (max-width: 900px) {
        .todo-item {
          grid-template-columns: minmax(0, 1fr);
          align-items: stretch;
        }

        .todo-open-link {
          justify-self: start;
        }
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
      }

      .panel + .panel {
        margin-top: 16px;
      }

      .group-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 6px;
      }

      .share-avatars {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        position: relative;
      }

      .avatar-stack {
        display: inline-flex;
        align-items: center;
      }

      .project-list .project-item .avatar-stack,
      .sidebar-stack > .sidebar-stack-item > .project-item .avatar-stack {
        width: 100%;
        justify-content: flex-end;
      }

      .avatar-stack .avatar-chip {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--panel-alt);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 700;
        overflow: hidden;
      }

      .avatar-stack .avatar-chip + .avatar-chip {
        margin-left: -6px;
      }

      .avatar-stack .avatar-chip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .share-avatars .avatar-chip {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--panel-alt);
        border: 1px solid var(--border);
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        overflow: hidden;
      }

      .share-avatars .avatar-chip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .share-avatars::after {
        content: attr(data-tooltip);
        position: absolute;
        left: 0;
        top: 120%;
        background: #0f141c;
        color: var(--ink);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 11px;
        white-space: pre;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease;
        z-index: 10;
        min-width: 160px;
      }

      .share-avatars:hover::after {
        opacity: 1;
      }

      .group-block.dragging {
        opacity: 0.6;
      }

      .group-block.drag-over .panel.group {
        box-shadow: 0 0 0 1px var(--group-color, var(--accent));
      }

      .group-block {
        transition: transform 140ms ease;
        margin-bottom: 12px;
      }

      .group-header[draggable="true"] {
        cursor: grab;
      }

      .group-header[draggable="true"]:active {
        cursor: grabbing;
      }

      .panel.group {
        border-color: var(--group-color, var(--border));
        padding-top: 8px;
        box-shadow:
          inset 0 0 0 1px color-mix(in srgb, var(--group-color, var(--border)) 24%, transparent),
          0 18px 40px rgba(0, 0, 0, 0.2);
      }

      .group-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--group-color, var(--accent));
        font-size: 15px;
        margin: 0;
        padding: 0 8px 0 6px;
        background: linear-gradient(
          to bottom,
          transparent 0%,
          transparent 35%,
          var(--panel) 35%,
          var(--panel) 65%,
          transparent 65%,
          transparent 100%
        );
        position: relative;
        top: -18px;
        line-height: 1.1;
        text-shadow: 0 0 18px color-mix(in srgb, var(--group-color, transparent) 18%, transparent);
      }


      .group-insert-wrap {
        padding: 0 14px;
        margin: 8px 0;
      }

      .group-insert-wrap.disabled {
        opacity: 0;
        pointer-events: none;
      }

      .group-insert {
        position: relative;
        height: 20px;
        width: 100%;
        box-sizing: border-box;
        cursor: pointer;
        z-index: 2;
      }

      .group-insert-line {
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        height: 1px;
        background: rgba(76, 201, 240, 0.35);
        opacity: 0.15;
        transition: opacity 120ms ease;
      }

      .group-insert-btn {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(0.9);
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 1px solid rgba(76, 201, 240, 0.6);
        background: #0b1118;
        color: var(--accent);
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 120ms ease, transform 120ms ease;
        cursor: pointer;
      }

      .group-insert:hover .group-insert-line,
      .group-insert:focus-within .group-insert-line {
        opacity: 0.6;
      }

      .group-insert:hover .group-insert-btn,
      .group-insert:focus-within .group-insert-btn {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .panel + .group-insert {
        margin-top: 10px;
      }

      .group-insert + .panel {
        margin-top: 10px;
      }


      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--accent);
        color: #041015;
        background: var(--accent);
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .btn.secondary {
        background: transparent;
        color: var(--accent);
      }

      .context-menu {
        position: fixed;
        background: #0f141c;
        border: 1px solid var(--border);
        border-radius: 8px;
        min-width: 160px;
        z-index: 2000;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
        padding: 6px 0;
        display: none;
      }

      .context-menu > button,
      .context-menu > .context-menu-submenu > button {
        width: 100%;
        background: transparent;
        border: none;
        text-align: left;
        padding: 8px 12px;
        color: var(--ink);
        cursor: pointer;
        font-size: 12px;
      }

      .context-menu > button:hover,
      .context-menu > .context-menu-submenu > button:hover {
        background: rgba(76, 201, 240, 0.08);
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(4, 7, 12, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2500;
        pointer-events: auto;
      }

      .modal.open {
        display: flex;
      }

      .modal .panel {
        width: 360px;
        position: relative;
        z-index: 2;
        pointer-events: auto;
      }

      .modal .suggest-list {
        border: 1px solid var(--border);
        border-radius: 6px;
        margin-top: 8px;
        max-height: 180px;
        overflow: auto;
        position: relative;
        z-index: 3;
        pointer-events: auto;
      }

      .modal .suggest-list button {
        width: 100%;
        border: none;
        background: transparent;
        text-align: left;
        padding: 8px 10px;
        color: var(--ink);
        cursor: pointer;
        font-size: 12px;
      }

      .modal .suggest-list button:hover {
        background: rgba(76, 201, 240, 0.08);
      }

      .share-list {
        margin-top: 12px;
        border-top: 1px solid var(--grid);
        padding-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .share-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .share-item .meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .share-item .avatar-chip {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        overflow: hidden;
      }

      .share-item .avatar-chip img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .share-item .label {
        font-size: 12px;
        color: var(--ink);
      }

      .share-item .muted {
        color: var(--muted);
        font-size: 11px;
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input, select {
        width: 100%;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #0f141c;
        color: var(--ink);
        font-family: inherit;
        font-size: 12px;
      }

      ul { padding-left: 18px; }
      li { margin-bottom: 6px; }

      .tag {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(76, 201, 240, 0.15);
        color: var(--accent);
        font-size: 11px;
      }

      .tag.status-accepted {
        background: rgba(110, 231, 183, 0.14);
        color: var(--success);
      }

      .tag.status-declined,
      .tag.status-denied {
        background: rgba(248, 113, 113, 0.14);
        color: #f87171;
      }

      .footer-note {
        color: var(--muted);
        font-size: 12px;
      }

      .table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .table th, .table td {
        text-align: left;
        padding: 6px 6px;
        border-bottom: 1px solid var(--grid);
        border-right: 1px solid var(--grid);
        font-size: 12px;
        vertical-align: top;
        position: relative;
      }

      .table th {
        position: relative;
      }

      .col-resizer {
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        width: 6px;
        cursor: col-resize;
        user-select: none;
      }

      .table th {
        color: var(--muted);
        text-transform: uppercase;
        font-size: 10px;
        letter-spacing: 0.5px;
        background: rgba(10, 14, 20, 0.7);
      }

      .table th:last-child,
      .table td:last-child {
        border-right: none;
      }

      .table tbody tr:hover {
        background: rgba(76, 201, 240, 0.06);
      }

      .table tbody tr {
        transition: background 180ms ease, opacity 180ms ease, transform 180ms ease, box-shadow 180ms ease;
      }

      .table tbody tr[data-status-state] td {
        transition: background 180ms ease, color 180ms ease, border-color 180ms ease, opacity 180ms ease;
      }

      .task-row[data-status-state="critical"] td,
      .subtasks-row[data-status-state="critical"] td,
      .todo-item[data-status-state="critical"] {
        background: color-mix(in srgb, #f87171 10%, transparent);
      }

      .task-row[data-status-state="critical"] td:first-child,
      .subtasks-row[data-status-state="critical"] td:first-child {
        box-shadow: inset 3px 0 0 #f87171;
      }

      .task-row[data-status-state="critical"] .editable[data-field="title"],
      .subtasks-row[data-status-state="critical"] .editable[data-field="title"] {
        color: #ffd1d1;
      }

      .task-row[data-status-state="complete"] td,
      .subtasks-row[data-status-state="complete"] td {
        background: rgba(16, 20, 27, 0.52);
      }

      .task-row[data-status-state="complete"],
      .subtasks-row[data-status-state="complete"] {
        opacity: 0.68;
      }

      .task-row[data-status-state="complete"] td:first-child,
      .subtasks-row[data-status-state="complete"] td:first-child {
        box-shadow: inset 3px 0 0 rgba(110, 231, 183, 0.85);
      }

      .task-row[data-status-state="complete"] .editable[data-field="title"],
      .subtasks-row[data-status-state="complete"] .editable[data-field="title"],
      .todo-item[data-status-state="complete"] .todo-item-title {
        color: var(--muted);
        text-decoration: line-through;
        text-decoration-thickness: 1.5px;
      }

      .todo-item[data-status-state="complete"] {
        opacity: 0.74;
        background: rgba(16, 20, 27, 0.56);
      }

      .status-editable {
        position: relative;
        min-height: 18px;
        display: inline-flex;
        align-items: center;
        min-width: 76px;
        padding: 4px 10px 4px 28px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
      }

      .status-editable::before {
        content: "\f192";
        position: absolute;
        left: 9px;
        top: 50%;
        transform: translateY(-50%);

      .color-preset-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .color-preset {
        appearance: none;
        display: block;
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 999px;
        border: 2px solid color-mix(in srgb, var(--swatch) 65%, white);
        background: var(--swatch);
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.16);
      }

      .color-preset:hover,
      .color-preset.is-active {
        transform: translateY(-1px);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--swatch) 30%, transparent), 0 6px 14px rgba(0, 0, 0, 0.2);
      }

      .color-custom-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .color-custom-row input[type="color"] {
        width: 36px;
        height: 28px;
        padding: 0;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
      }

      .color-menu-actions {
        margin-top: 10px;
        display: flex;
        justify-content: flex-end;
      }

      .sidebar-plus-btn {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 1px solid rgba(76, 201, 240, 0.6);
        background: #0b1118;
        color: var(--accent);
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: opacity 120ms ease, transform 120ms ease, border-color 120ms ease;
      }

      .sidebar-plus-btn:hover {
        transform: translateY(-1px);
        border-color: rgba(76, 201, 240, 0.9);
      }

      .sidebar .project-list:last-child {
        margin-bottom: 0;
      }

      .project-drop-target {
        transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease, background 160ms ease;
      }

      .project-drop-target.drag-over {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px rgba(76, 201, 240, 0.42), 0 12px 24px rgba(0, 0, 0, 0.18);
        background: rgba(76, 201, 240, 0.08);
        transform: translateX(4px);
      }

      .project-list small {
        color: var(--muted);
        display: block;
        margin-top: 4px;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Termin</h1>
      <div>
        {% if user %}
          <div class="account-shell" data-account-menu>
            <button class="account-trigger" type="button" aria-haspopup="menu" aria-expanded="false" data-account-trigger>
              <span class="account-avatar">
                {% if user.avatar_url %}
                  <img src="{{ user.avatar_url }}" alt="avatar" referrerpolicy="no-referrer" onerror="this.remove();" />
                {% else %}
                  {{ user.email[0]|upper }}
                {% endif %}
              </span>
              <span class="account-meta">
                <span class="account-name">{{ user.display_name or "Account" }}</span>
                <span class="account-email">{{ user.email }}</span>
              </span>
              <svg class="account-chevron" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="currentColor" d="M7 10l5 5 5-5z"></path>
              </svg>
            </button>
            <div class="account-menu" role="menu">
              <div class="account-menu-header">
                <div class="account-menu-name">{{ user.display_name or "Account" }}</div>
                <div class="account-menu-email">{{ user.email }}</div>
              </div>
              <a class="account-menu-link" href="{{ url_for('ui.account') }}" role="menuitem">
                <span>Account</span>
                <span class="footer-note">Manage profile</span>
              </a>
              {% if config.DEV_MAILBOX_ENABLED %}
                <a class="account-menu-link" href="{{ url_for('ui.dev_mailbox') }}" role="menuitem">
                  <span>Dev Mail</span>
                  <span class="footer-note">Captured emails</span>
                </a>
              {% endif %}
              <a class="account-menu-link" href="{{ url_for('auth.logout') }}" role="menuitem">
                <span>Log out</span>
                <span class="footer-note">End session</span>
              </a>
            </div>
          </div>
        {% endif %}
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("input, textarea").forEach((el) => {
          el.setAttribute("autocomplete", "off");
          el.setAttribute("autocapitalize", "off");
          el.setAttribute("spellcheck", "false");
        });

        const accountShell = document.querySelector("[data-account-menu]");
        const accountTrigger = document.querySelector("[data-account-trigger]");
        if (accountShell && accountTrigger) {
          const closeMenu = () => {
            accountShell.classList.remove("is-open");
            accountTrigger.setAttribute("aria-expanded", "false");
          };

          accountTrigger.addEventListener("click", (event) => {
            event.preventDefault();
            const nextOpen = !accountShell.classList.contains("is-open");
            if (nextOpen) {
              accountShell.classList.add("is-open");
              accountTrigger.setAttribute("aria-expanded", "true");
            } else {
              closeMenu();
            }
          });

          document.addEventListener("click", (event) => {
            if (!accountShell.contains(event.target)) {
              closeMenu();
            }
          });

          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
              closeMenu();
            }
          });
        }
      });
    </script>
  </body>
</html>
