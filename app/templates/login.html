{% extends "base.html" %}
{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="auth-eyebrow">Termin</div>
      <h2>Sign in</h2>
      <p class="footer-note">Accounts are created from invitation email links. Use your password or a connected provider after you have claimed access.</p>
    </div>
    {% if error %}
      <div class="auth-error" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" class="auth-form">
      <div class="auth-field">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" autocomplete="username" />
      </div>
      <div class="auth-field">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" />
      </div>
      <button class="btn auth-submit" type="submit">Sign in</button>
    </form>
    <div class="auth-divider" aria-hidden="true">
      <span>or</span>
    </div>
    <div class="auth-provider-list">
      <a class="auth-provider-btn google" href="{{ url_for('auth.login_google') }}">
        <span class="auth-provider-icon"><i class="fa-brands fa-google"></i></span>
        <span>Continue with Google</span>
      </a>
      <a class="auth-provider-btn github" href="{{ url_for('auth.login_github') }}">
        <span class="auth-provider-icon"><i class="fa-brands fa-github"></i></span>
        <span>Continue with GitHub</span>
      </a>
    </div>
  </div>
</section>
{% endblock %}
