services:
  - type: web
    name: termin
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python3 render_start.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: instance
      mountPath: /opt/render/project/src/instance
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SECRET_KEY
        generateValue: true
      - key: DEV_MAILBOX_ENABLED
        value: "true"
      - key: DEV_MAILBOX_CAPTURE_ONLY
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: GUNICORN_TIMEOUT
        value: "120"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GOOGLE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_USE_TLS
        sync: false
      - key: SMTP_USE_SSL
        sync: false
      - key: MAIL_FROM_EMAIL
        sync: false
      - key: MAIL_FROM_NAME
        sync: false
